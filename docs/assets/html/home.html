<section class="container m-2 mx-auto">

  <h2 id="greeting">
    <!-- Set in settings.js -->
  </h2>
  <p class="lead">Welcome to your Game Collection App!</p>

  <div class="row g-3">
    <!-- Total Games -->
    <div class="col-md-6 col-xxl-4">
      <div class="card bg-primary h-100">
        <div class="card-body d-flex align-items-center text-dark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-xxl">
            <path d="M11.146 15.854a1.207 1.207 0 0 1 1.708 0l1.56 1.56A2 2 0 0 1 15 18.828V21a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-2.172a2 2 0 0 1 .586-1.414z" />
            <path d="M18.828 15a2 2 0 0 1-1.414-.586l-1.56-1.56a1.207 1.207 0 0 1 0-1.708l1.56-1.56A2 2 0 0 1 18.828 9H21a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1z" />
            <path d="M6.586 14.414A2 2 0 0 1 5.172 15H3a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2.172a2 2 0 0 1 1.414.586l1.56 1.56a1.207 1.207 0 0 1 0 1.708z" />
            <path d="M9 3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2.172a2 2 0 0 1-.586 1.414l-1.56 1.56a1.207 1.207 0 0 1-1.708 0l-1.56-1.56A2 2 0 0 1 9 5.172z" />
          </svg>
          <div class="text-center flex-grow-1">
            <p id="total-games" class="display-5 mb-2">0</p>
            <h5 class="card-title mb-0">Total Games</h5>
          </div>
        </div>
      </div>
    </div>

    <!-- Games Completed -->
    <div class="col-md-6 col-xxl-4">
      <div class="card bg-success h-100">
        <div class="card-body d-flex align-items-center text-dark">
          <div class="me-3 display-3">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-xxl">
              <path d="M21.801 10A10 10 0 1 1 17 3.335" />
              <path d="m9 11 3 3L22 4" />
            </svg>
          </div>
          <div class="text-center flex-grow-1">
            <p id="completed-games" class="display-5 mb-2">0</p>
            <h5 class="card-title mb-0">Games Completed</h5>
          </div>
        </div>
      </div>
    </div>

    <!-- Currently Playing -->
    <div class="col-md-6 col-xxl-4">
      <div class="card bg-info h-100">
        <div class="card-body d-flex align-items-center text-dark">
          <div class="me-3 display-3">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-xxl">
              <path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z" />
            </svg>
          </div>
          <div class="text-center flex-grow-1">
            <p id="currently-playing-games" class="display-5 mb-2">0</p>
            <h5 class="card-title mb-0">Currently Playing</h5>
          </div>
        </div>
      </div>
    </div>

    <!-- Backlog -->
    <div class="col-md-6 col-xxl-4">
      <div class="card bg-warning h-100">
        <div class="card-body d-flex align-items-center text-dark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-xxl">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 6v6l4 2" />
          </svg>
          <div class="text-center flex-grow-1">
            <p id="backlog-games" class="display-5 mb-2">0</p>
            <h5 class="card-title mb-0">Backlog</h5>
          </div>
        </div>
      </div>
    </div>

    <!-- Total Spent -->
    <div class="col-md-6 col-xxl-4">
      <div class="card bg-danger h-100">
        <div class="card-body d-flex align-items-center text-dark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-xxl">
            <path d="M11 17h3v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-3a3.16 3.16 0 0 0 2-2h1a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1h-1a5 5 0 0 0-2-4V3a4 4 0 0 0-3.2 1.6l-.3.4H11a6 6 0 0 0-6 6v1a5 5 0 0 0 2 4v3a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1z" />
            <path d="M16 10h.01" />
            <path d="M2 8v1a2 2 0 0 0 2 2h1" />
          </svg>
          <div class="text-center flex-grow-1">
            <p id="total-spent" class="display-5 mb-2">£0.00</p>
            <h5 class="card-title mb-0">Total Spent</h5>
          </div>
        </div>
      </div>
    </div>

    <!-- Total Platforms -->
    <div class="col-md-6 col-xxl-4">
      <div class="card bg-secondary h-100">
        <div class="card-body d-flex align-items-center text-dark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-xxl">
            <path d="M21 17a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2Z" />
            <path d="M6 15v-2" />
            <path d="M12 15V9" />
            <circle cx="12" cy="6" r="3" />
          </svg>
          <div class="text-center flex-grow-1">
            <p id="total-platforms" class="display-5 mb-2">0</p>
            <h5 class="card-title">Total Platforms</h5>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
