<section id="game-details-container" class="container my-2 mx-auto">

  <h2 class="display-3 mb-3">Game Details</h2>

  <form id="game-edit-form" class="row">

    <fieldset class="col-lg-6">
      <legend>Game Info</legend>
      <div id="game-info-set" class="row">
        <!-- Game Form Fields -->
      </div>
    </fieldset>

    <fieldset class="col-lg-6">
      <legend>Collection Info</legend>
      <div id="game-collection-info-set" class="row">
        <!-- Game Form Fields -->
      </div>
    </fieldset>

    <div class="col-12 d-flex flex-row-reverse">
      <button id="save-btn" class="btn btn-success mx-2">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-md me-2">
          <path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" />
          <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7" />
          <path d="M7 3v4a1 1 0 0 0 1 1h7" />
        </svg>
        Save
      </button>
      <button id="save-btn" type="reset" class="btn btn-warning">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="svg-md me-2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
        Reset
      </button>
    </div>

  </form>

</section>
